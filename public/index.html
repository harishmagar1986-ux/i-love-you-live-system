<h1>🏏 I LOVE YOU Cricket AI</h1>
<button onclick="loadMatches()">LOAD MATCHES</button>
<select id="matches" onchange="showMatch()"></select>
<div id="app"></div>

<script>
const BACKEND = "https://i-love-you-backend.onrender.com";

const DEMO = [
  {id:"demo1",name:"India vs Australia",status:"DEMO MODE: India 142/3 in 15.2 overs"},
  {id:"demo2",name:"CSK vs MI",status:"DEMO MODE: CSK need 48 runs from 30 balls"},
  {id:"demo3",name:"RCB vs GT",status:"DEMO MODE: RCB 88/2 in 9 overs"}
];

let matches = [];

async function loadMatches(){
  document.getElementById("app").innerHTML = "Loading...";
  try{
    let r = await fetch(BACKEND + "/api/matches");
    let j = await r.json();
    matches = j.data && j.data.length ? j.data : DEMO;
  }catch(e){
    matches = DEMO;
  }

  let sel = document.getElementById("matches");
  sel.innerHTML = "";
  matches.forEach(m=>{
    let o=document.createElement("option");
    o.value=m.id;
    o.textContent=m.name;
    sel.appendChild(o);
  });

  showMatch();
}

function showMatch(){
  let id=document.getElementById("matches").value;
  let m=matches.find(x=>x.id===id);
  let demo = id.startsWith("demo");

  document.getElementById("app").innerHTML = `
    <div style="padding:15px;margin-top:15px;border-radius:15px;background:#101d33;color:white">
      <h2>${m.name}</h2>
      <p>${m.status}</p>
      <h3>${demo ? "🟡 DEMO MODE" : "🟢 LIVE MODE"}</h3>
      <p>AI Decision: ${demo ? "WAIT / TESTING" : "LIVE ANALYSIS"}</p>
    </div>
  `;
}
</script>

<style>
body{font-family:Arial;background:#06101f;color:white;padding:20px}
button,select{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:0}
button{background:#00e676;font-weight:bold}
</style>

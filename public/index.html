<script>
async function load(){
  document.getElementById("matches").innerHTML="Loading...";

  let res = await fetch("/api/current-matches");
  let json = await res.json();

  let html = json.data.map(m=>{
    let ai = analyze(m);

    return `
      <div class="card">
        <h2>${m.name}</h2>
        <p>${m.status}</p>
        <b>${m.score}</b>

        <p class="${ai.cls}">${ai.decision}</p>

        <p>Win Probability: ${ai.win}%</p>
        <p>Opportunity: ${ai.opportunity}/100</p>
        <p>Momentum: ${ai.momentum}</p>
        <p>Risk: ${ai.risk}</p>
      </div>
    `;
  }).join("");

  document.getElementById("matches").innerHTML = html;
}

function analyze(m){
  let status = (m.status || "").toLowerCase();

  let win = 50;
  let opportunity = 50;
  let decision = "WAIT";
  let cls = "wait";
  let momentum = "Neutral";
  let risk = "Medium";

  if(status.includes("won")){
    win = 100;
    opportunity = 0;
    decision = "MATCH FINISHED";
    cls = "good";
    momentum = "Completed";
    risk = "None";
  }
  else if(status.includes("need")){
    win = 65;
    opportunity = 75;
    decision = "STRONG YES";
    cls = "good";
    momentum = "Chasing";
    risk = "Medium";
  }
  else if(status.includes("require")){
    win = 40;
    opportunity = 60;
    decision = "WAIT";
    cls = "wait";
    momentum = "Pressure";
    risk = "High";
  }

  return {win,opportunity,decision,cls,momentum,risk};
}

setInterval(load,15000);
</script>

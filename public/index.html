let html = json.data.map(m => {
  let prob = getWinProbability(m);
  let decision = getDecision(prob);
  let opp = getOpportunity(prob);

  return `
  <div class="card">
    <h2>${m.name}</h2>
    <p>${m.status}</p>
    <b>${m.score}</b>

    <div class="ai green">
      Win: A ${prob.teamA}% | B ${prob.teamB}%
    </div>

    <div class="ai yellow">
      ${decision}
    </div>

    <div class="ai">
      Opportunity: ${opp}/100
    </div>

  </div>
  `;
}).join("");

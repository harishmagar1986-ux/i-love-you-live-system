<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I LOVE YOU Cricket AI</title>
<style>
body{margin:0;font-family:Arial;background:#07111f;color:white}
.box{padding:18px}
.card{background:#101c2f;margin:12px 0;padding:15px;border-radius:16px}
button,input,select{width:100%;padding:14px;margin:7px 0;border-radius:12px;border:0;font-size:16px}
button{background:#00e676;font-weight:bold}
.badge{display:inline-block;padding:8px 12px;border-radius:20px;background:#1f8bff;margin:4px}
.big{font-size:28px;font-weight:bold}
.wait{background:#ffb300}.enter{background:#00c853}.block{background:#ff1744}
.small{color:#b7c4d6}
</style>
</head>
<body>
<div class="box">
  <h1>🏏 I LOVE YOU Cricket AI</h1>
  <div class="card">
    <b>Real API Key</b>
    <input id="key" placeholder="275608b3-211a-43c8-a57a-b7e30473d84c">
    <button onclick="saveKey()">SAVE KEY</button>
    <button onclick="loadMatches()">LOAD LIVE MATCHES</button>
    <div class="small">Auto refresh: 15 seconds after match select</div>
  </div>

  <div class="card">
    <b>Select Match</b>
    <select id="matches" onchange="selectMatch()">
      <option>Load matches first</option>
    </select>
  </div>

  <div id="app"></div>
</div>

<script>
let API_KEY = localStorage.getItem("CRICKET_KEY") || "";
document.getElementById("key").value = API_KEY;
let selectedId = "";
let timer = null;

function saveKey(){
  API_KEY = document.getElementById("key").value.trim();
  localStorage.setItem("CRICKET_KEY", API_KEY);
  alert("API key saved");
}

async function api(url){
  const r = await fetch(url);
  return await r.json();
}

async function loadMatches(){
  if(!API_KEY) return alert("Paste API key first");
  const url = `https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`;
  try{
    const j = await api(url);
    const data = j.data || [];
    const sel = document.getElementById("matches");
    sel.innerHTML = "";
    data.forEach(m=>{
      const op=document.createElement("option");
      op.value=m.id;
      op.textContent=`${m.name || "Match"} | ${m.status || ""}`;
      sel.appendChild(op);
    });
    if(data.length===0) alert("No live match found or API limit/coverage issue");
  }catch(e){
    alert("API error. Check key or internet.");
  }
}

function selectMatch(){
  selectedId=document.getElementById("matches").value;
  loadMatchAI();
  clearInterval(timer);
  timer=setInterval(loadMatchAI,15000);
}

function safeNum(x){return Number(String(x||"0").replace(/[^\d.]/g,""))||0}

function analyse(match){
  const score = match.score || [];
  let text = JSON.stringify(match).toLowerCase();

  let runs = 0, wkts = 0, overs = 0;
  if(score[0]){
    runs=safeNum(score[0].r);
    wkts=safeNum(score[0].w);
    overs=safeNum(score[0].o);
  }

  let rr = overs>0 ? runs/overs : 0;
  let pressure = 40;
  if(wkts>=5) pressure+=25;
  if(wkts>=7) pressure+=20;
  if(rr>=9) pressure-=10;
  if(text.includes("need") || text.includes("required")) pressure+=10;

  let momentum = 50;
  if(rr>=8) momentum+=20;
  if(rr>=10) momentum+=10;
  if(wkts>=5) momentum-=20;

  let trap = 20;
  if(wkts>=2 && overs<4) trap+=25;
  if(wkts>=6) trap+=25;
  if(text.includes("review") || text.includes("rain")) trap+=15;

  let confidence = Math.max(5,Math.min(95, momentum - trap + 45 - pressure/3));
  let decision="WAIT";
  let cls="wait";
  if(confidence>=80 && trap<35 && pressure<60){decision="ENTER";cls="enter"}
  if(trap>=60 || pressure>=80){decision="BLOCK";cls="block"}

  return {runs,wkts,overs,rr:rr.toFixed(2),pressure,momentum,trap,confidence:confidence.toFixed(0),decision,cls};
}

async function loadMatchAI(){
  if(!selectedId) return;
  const app=document.getElementById("app");
  app.innerHTML=`<div class="card">Loading live AI...</div>`;

  try{
    const url=`https://api.cricapi.com/v1/match_scorecard?apikey=${API_KEY}&id=${selectedId}`;
    const j=await api(url);
    const m=j.data || {};
    const a=analyse(m);

    let scoreHtml="";
    (m.score||[]).forEach(s=>{
      scoreHtml+=`<div class="badge">${s.inning||"Innings"}: ${s.r}/${s.w} (${s.o})</div>`;
    });

    let bats="";
    if(m.scorecard){
      m.scorecard.forEach(inn=>{
        bats+=`<div class="card"><b>${inn.inning||"Innings"}</b>`;
        (inn.batting||[]).slice(0,6).forEach(p=>{
          bats+=`<div>${p.batsman?.name||p.name||"Player"} - ${p.r||0} runs</div>`;
        });
        bats+=`</div>`;
      });
    }

    app.innerHTML=`
      <div class="card">
        <div class="big">${m.name || "Live Match"}</div>
        <div class="small">${m.status || ""}</div>
        ${scoreHtml}
      </div>

      <div class="card ${a.cls}">
        <h2>AI FINAL DECISION: ${a.decision}</h2>
        <div>Confidence: ${a.confidence}%</div>
        <div>Run Rate: ${a.rr}</div>
        <div>Momentum: ${a.momentum}</div>
        <div>Pressure: ${a.pressure}</div>
        <div>Trap Risk: ${a.trap}</div>
      </div>

      <div class="card">
        <h3>AI Reason</h3>
        <p>
        ${a.decision==="ENTER" ? "Clean momentum, acceptable pressure, low trap risk." : ""}
        ${a.decision==="WAIT" ? "Mixed situation. Need more ball-by-ball confirmation before strong signal." : ""}
        ${a.decision==="BLOCK" ? "High danger: wicket pressure, collapse risk, trap risk or unstable match condition." : ""}
        </p>
      </div>

      ${bats || `<div class="card">Ball-by-ball / scorecard data not available for this match or plan.</div>`}

      <div class="card small">
        Last updated: ${new Date().toLocaleTimeString()}
      </div>
    `;
  }catch(e){
    app.innerHTML=`<div class="card">Error loading match. API key, limit, or match coverage problem.</div>`;
  }
}
</script>
</body>
</html>
